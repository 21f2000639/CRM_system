<!DOCTYPE html>
<html>

<head>

    <title>ResolveHub</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</head>

<body style="margin:0;background:#eef2ff;font-family:Arial;">

<div id="root"></div>

<script>

const e = React.createElement

function Home() {

    const [tickets, setTickets] = React.useState(
        JSON.parse(`{{ tickets_data | safe }}`)
    )

    const userName = `{{ user_name }}`

    const [showModal, setShowModal] = React.useState(false)
    const [showEditModal, setShowEditModal] = React.useState(false)

    const [inputText, setInputText] = React.useState("")
    const [searchText, setSearchText] = React.useState("")

    const [statusFilter, setStatusFilter] = React.useState("")
    const [selectedTicket, setSelectedTicket] = React.useState(null)
    const [editTitle, setEditTitle] = React.useState("")
    const [editDescription, setEditDescription] = React.useState("")
    const [editPriority, setEditPriority] = React.useState("")
    const [isMobile, setIsMobile] = React.useState(window.innerWidth <= 768)

    React.useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth <= 768)
        window.addEventListener("resize", handleResize)
        return () => window.removeEventListener("resize", handleResize)
    }, [])

    const navbarStyle = {
        ...navbar,
        flexDirection: "column",
        alignItems: "stretch",
        gap: isMobile ? "18px" : "20px",
        padding: isMobile ? "20px" : "30px 40px"
    }

    const topRowStyle = {
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        width: "100%",
        gap: "16px",
        flexWrap: "wrap"
    }

    const searchBoxStyle = {
        ...searchBox,
        width: "auto",
        justifyContent: "center",
        flexDirection: isMobile ? "column" : "row",
        alignItems: "center",
        flexWrap: "nowrap"
    }

    const searchInputStyle = {
        ...searchInput,
        width: isMobile ? "100%" : "320px"
    }

    const statusSelectStyle = {
        ...filterSelect,
        width: isMobile ? "100%" : "auto"
    }

    const actionRowStyle = {
        display: "flex",
        gap: "12px",
        alignItems: "center",
        flexWrap: isMobile ? "wrap" : "nowrap",
        width: isMobile ? "100%" : "auto"
    }

    const contentPadding = isMobile ? "20px" : "40px"

    const filteredTickets = tickets.filter(ticket => {

        const combinedText = [
            ticket.ticket_id,
            ticket.title,
            ticket.description,
            ticket.priority,
            ticket.status,
            ticket.created_at
        ]
        .join(" ")
        .toLowerCase()

        const matchesSearch =
            combinedText.includes(searchText.toLowerCase())

        const matchesStatus =
            statusFilter === "" ||
            ticket.status === statusFilter

        return matchesSearch && matchesStatus
    })

    const openEditModal = ticket => {
        setSelectedTicket(ticket)
        setEditTitle(ticket.title)
        setEditDescription(ticket.description)
        setEditPriority(ticket.priority)
        setShowEditModal(true)
    }

    const saveTicketUpdate = () => {
        fetch(`/update-ticket/${selectedTicket.id}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: editTitle,
                description: editDescription,
                priority: editPriority
            })
        })
        .then(response => response.json())
        .then(data => {
            setTickets(prev => prev.map(t =>
                t.id === selectedTicket.id ? {
                    ...t,
                    title: editTitle,
                    description: editDescription,
                    priority: editPriority
                } : t
            ))
            setShowEditModal(false)
            setSelectedTicket(null)
        })
        .catch(error => console.error("Error updating ticket:", error))
    }

    return e(
        React.Fragment,
        null,

        // NAVBAR

        e(
            "div",
            {
                style:navbarStyle
            },

            e(
                "div",
                {
                    style:topRowStyle
                },

                e(
                    "div",
                    {
                        style:{
                            display:"flex",
                            flexDirection:"column",
                            justifyContent:"center",
                            gap:"12px"
                        }
                    },

                    e(
                        "h2",
                        {
                            style:{
                                margin:"0",
                                fontSize:"28px"
                            }
                        },
                        "ResolveHub"
                    ),

                    e(
                        "span",
                        {
                            style:{
                                color:"white",
                                fontWeight:"bold",
                                fontSize:"18px"
                            }
                        },
                        `Welcome, ${userName}`
                    )
                ),

                e(
                    "div",
                    {
                        style:{
                            display:"flex",
                            gap:"12px",
                            alignItems:"center",
                            flexWrap:"wrap"
                        }
                    },

                    e(
                        "button",
                        {
                            style:createButton,
                            onClick:()=>{
                                setShowModal(true)
                            }
                        },
                        "Create Ticket"
                    ),

                    e(
                        "select",
                        {
                            value:statusFilter,
                            onChange:(event)=>{
                                setStatusFilter(event.target.value)
                            },
                            style:statusSelectStyle
                        },
                        e("option",{value:""},"All Status"),
                        e("option",{value:"Open"},"Open"),
                        e("option",{value:"In Progress"},"In Progress"),
                        e("option",{value:"Closed"},"Closed")
                    ),

                    e(
                        "button",
                        {
                            style:logoutButton,
                            onClick:()=>{
                                window.location.href="/logout"
                            }
                        },
                        "Logout"
                    )
                )
            ),

            e(
                "div",
                {
                    style:searchBoxStyle
                },

                e(
                    "input",
                    {
                        type:"text",
                        placeholder:"Search tickets...",
                        value:inputText,
                        onChange:(event)=>{
                            setInputText(event.target.value)
                        },
                        style:searchInputStyle
                    }
                ),

                e(
                    "button",
                    {
                        style:searchButton,
                        onClick:()=>{
                            setSearchText(inputText)
                        }
                    },
                    "Search"
                ),

                e(
                    "button",
                    {
                        style:clearButton,
                        onClick:()=>{
                            setInputText("")
                            setSearchText("")
                            setStatusFilter("")
                            setSelectedTicket(null)
                        }
                    },
                    "Clear"
                )
            )
        ),

        // MAIN CONTENT
        e(
    "div",
    {
        style:{
            padding:contentPadding
        }
    },

    e(
        "h1",
        {
            style:{
                fontSize:"42px",
                marginBottom:"10px",
                color:"#111827",
                fontWeight:"700"
            }
        },
        "My Tickets"
    ),

    e(
        "p",
        {
            style:{
                color:"#6b7280",
                fontSize:"18px",
                marginBottom:"35px"
            }
        },
        "Track and manage all your support requests."
    ),

    e(
        "div",
        {
            style:{
                display:"grid",
                gridTemplateColumns:"repeat(auto-fit, minmax(220px, 1fr))",
                justifyContent:"center",
                gap:"20px"
            }
        },

        filteredTickets.map(ticket =>

            e(
                "div",
                {
                    key:ticket.id,

                    style:{
                        background:"white",
                        borderRadius:"16px",
                        padding:"22px",
                        boxShadow:"0 4px 15px rgba(0,0,0,0.08)",
                        display:"flex",
                        flexDirection:"column",
                        justifyContent:"space-between",
                        minHeight:"220px",
                        transition:"0.3s"
                    }
                },

                // TOP CONTENT

                e(
                    "div",
                    null,

                    e(
                        "div",
                        {
                            style:{
                                display:"flex",
                                justifyContent:"space-between",
                                alignItems:"center",
                                marginBottom:"15px"
                            }
                        },

                        e(
                            "span",
                            {
                                style:{
                                    background:"#dbeafe",
                                    color:"#1d4ed8",
                                    padding:"6px 12px",
                                    borderRadius:"20px",
                                    fontSize:"12px",
                                    fontWeight:"600"
                                }
                            },
                            ticket.priority
                        ),

                        e(
                            "span",
                            {
                                style:{
                                    background:
                                        ticket.status === "Closed"
                                        ? "#dcfce7"
                                        : ticket.status === "In Progress"
                                        ? "#fef3c7"
                                        : "#fee2e2",

                                    color:
                                        ticket.status === "Closed"
                                        ? "#166534"
                                        : ticket.status === "In Progress"
                                        ? "#92400e"
                                        : "#991b1b",

                                    padding:"6px 12px",
                                    borderRadius:"20px",
                                    fontSize:"12px",
                                    fontWeight:"600"
                                }
                            },
                            ticket.status
                        )
                    ),

                    e(
                        "h3",
                        {
                            style:{
                                margin:"0 0 12px 0",
                                color:"#111827",
                                fontSize:"22px"
                            }
                        },
                        ticket.title
                    ),

                    e(
                        "p",
                        {
                            style:{
                                color:"#6b7280",
                                fontSize:"14px",
                                lineHeight:"1.6",
                                marginBottom:"15px"
                            }
                        },
                        ticket.description.length > 90
                            ? ticket.description.substring(0,90) + "..."
                            : ticket.description
                    )
                ),

                // FOOTER

                e(
                    "div",
                    {
                        style:{
                            marginTop:"auto"
                        }
                    },

                    e(
                        "p",
                        {
                            style:{
                                color:"#9ca3af",
                                fontSize:"13px",
                                marginBottom:"15px"
                            }
                        },
                        ticket.created_at
                    ),

                    e(
                        "div",
                        {
                            style:{
                                display:"flex",
                                justifyContent:"space-between",
                                alignItems:"center"
                            }
                        },

                        e(
                            "button",
                            {
                                style:{
                                    background:"#2563eb",
                                    color:"white",
                                    border:"none",
                                    borderRadius:"8px",
                                    padding:"10px 16px",
                                    cursor:"pointer",
                                    fontWeight:"600"
                                },

                                onClick:()=>{
                                    setSelectedTicket(ticket)
                                }
                            },
                            "View Details"
                        ),

                        e(
                            "button",
                            {
                                style:{
                                    background:"#10b981",
                                    color:"white",
                                    border:"none",
                                    borderRadius:"8px",
                                    padding:"10px 16px",
                                    cursor:"pointer",
                                    fontWeight:"600"
                                },

                                onClick:()=>{
                                    openEditModal(ticket)
                                }
                            },
                            "Update"
                        )
                    )
                )
            )
        )
    )
),
       

        // CREATE MODAL

        showModal &&

        e(
            "div",
            {
                style:modalOverlay
            },

            e(
                "div",
                {
                    style:modalBox
                },

                e(
                    "button",
                    {
                        style:xButton,

                        onClick:()=>{
                            setShowModal(false)
                        }
                    },
                    "×"
                ),

                e(
                    "h2",
                    {
                        style:{
                            marginTop:"0",
                            marginBottom:"20px",
                            color:"#111827"
                        }
                    },
                    "Create Support Ticket"
                ),

                e(
                    "form",
                    {
                        method:"POST",
                        action:"/create-ticket"
                    },

                    // CATEGORY

                    e(
                        "select",
                        {
                            name:"title",
                            required:true,
                            style:modalInput
                        },

                        e("option",{value:""},"Select Ticket Category"),

                        e("option",{value:"Payment Issue"},"Payment Issue"),
                        e("option",{value:"Login Problem"},"Login Problem"),
                        e("option",{value:"Account Access Request"},"Account Access Request"),
                        e("option",{value:"Bug Report"},"Bug Report"),
                        e("option",{value:"Feature Request"},"Feature Request"),
                        e("option",{value:"Technical Support"},"Technical Support")
                    ),

                    // DESCRIPTION

                    e(
                        "textarea",
                        {
                            name:"description",

                            placeholder:"Describe your issue in detail...",

                            required:true,

                            style:{
                                ...modalInput,
                                height:"140px",
                                resize:"none"
                            }
                        }
                    ),

                    // PRIORITY

                    e(
                        "select",
                        {
                            name:"priority",
                            required:true,
                            style:modalInput
                        },

                        e("option",{value:""},"Select Priority"),
                        e("option",{value:"Low"},"Low"),
                        e("option",{value:"Medium"},"Medium"),
                        e("option",{value:"High"},"High")
                    ),

                    // SUBMIT BUTTON

                    e(
                        "button",
                        {
                            type:"submit",

                            style:submitButton
                        },
                        "Submit Ticket"
                    )
                )
            )
        ),

        // VIEW MODAL

        selectedTicket && !showEditModal &&

        e(
            "div",
            {
                style:modalOverlay
            },

            e(
                "div",
                {
                    style:modalBox
                },

                e(
                    "button",
                    {
                        style:xButton,

                        onClick:()=>{
                            setSelectedTicket(null)
                        }
                    },
                    "×"
                ),

                e(
                    "h2",
                    {
                        style:{
                            margin:"0 0 12px 0",
                            fontSize:"20px",
                            color:"#111827"
                        }
                    },
                    selectedTicket.title
                ),

                e(
                    "p",
                    {
                        style:{
                            fontSize:"12px",
                            color:"#6b7280",
                            margin:"6px 0"
                        }
                    },
                    `ID: ${selectedTicket.ticket_id}`
                ),

                e(
                    "p",
                    {
                        style:{
                            fontSize:"13px",
                            color:"#4b5563",
                            margin:"4px 0"
                        }
                    },
                    `Priority: ${selectedTicket.priority}`
                ),

                e(
                    "p",
                    {
                        style:{
                            fontSize:"13px",
                            color:"#4b5563",
                            margin:"4px 0"
                        }
                    },
                    `Status: ${selectedTicket.status}`
                ),

                e(
                    "p",
                    {
                        style:{
                            fontSize:"12px",
                            color:"#6b7280",
                            margin:"4px 0"
                        }
                    },
                    `Created: ${selectedTicket.created_at}`
                ),

                e(
                    "hr",
                    {
                        style:{
                            border:"none",
                            borderTop:"1px solid #e5e7eb",
                            margin:"12px 0"
                        }
                    }
                ),

                e(
                    "p",
                    {
                        style:{
                            fontSize:"13px",
                            lineHeight:"1.6",
                            color:"#4b5563",
                            margin:"0"
                        }
                    },
                    selectedTicket.description
                )
            )
        ),

        showEditModal && selectedTicket &&

        e(
            "div",
            {
                style:modalOverlay
            },

            e(
                "div",
                {
                    style:modalBox
                },

                e(
                    "button",
                    {
                        style:xButton,

                        onClick:()=>{
                            setShowEditModal(false)
                            setSelectedTicket(null)
                        }
                    },
                    "×"
                ),

                e(
                    "h2",
                    {
                        style:{
                            marginTop:"0",
                            marginBottom:"20px",
                            color:"#111827"
                        }
                    },
                    "Update Ticket"
                ),

                e(
                    "label",
                    null,
                    "Title"
                ),

                e(
                    "input",
                    {
                        value:editTitle,
                        onChange:(event)=>{
                            setEditTitle(event.target.value)
                        },
                        style:modalInput
                    }
                ),

                e(
                    "label",
                    {
                        style:{
                            marginTop:"15px",
                            display:"block",
                            fontWeight:"600"
                        }
                    },
                    "Description"
                ),

                e(
                    "textarea",
                    {
                        value:editDescription,
                        onChange:(event)=>{
                            setEditDescription(event.target.value)
                        },
                        style:{
                            ...modalInput,
                            height:"140px",
                            resize:"none"
                        }
                    }
                ),

                e(
                    "label",
                    {
                        style:{
                            marginTop:"15px",
                            display:"block",
                            fontWeight:"600"
                        }
                    },
                    "Priority"
                ),

                e(
                    "select",
                    {
                        value:editPriority,
                        onChange:(event)=>{
                            setEditPriority(event.target.value)
                        },
                        style:modalInput
                    },
                    e("option",{value:""},"Select Priority"),
                    e("option",{value:"Low"},"Low"),
                    e("option",{value:"Medium"},"Medium"),
                    e("option",{value:"High"},"High")
                ),

                e(
                    "button",
                    {
                        style:submitButton,
                        onClick:(event)=>{
                            event.preventDefault()
                            saveTicketUpdate()
                        }
                    },
                    "Save Changes"
                )
            )
        )
    )
}

const navbar = {
    background:"#4338ca",
    color:"white",
    padding:"30px 40px",
    display:"flex",
    justifyContent:"space-between",
    alignItems:"center",
    position:"relative"
}

const searchBox = {
    display:"flex",
    alignItems:"center",
    gap:"6px",
    padding:"10px 0px",
    background:"transparent",
    borderRadius:"0px",
    border:"none",
    width:"auto",
    flexWrap:"nowrap"
}

const searchInput = {
    padding:"10px 14px",
    width:"300px",
    borderRadius:"4px",
    border:"none",
    fontSize:"14px",
    background:"white",
    outline:"none"
}

const searchButton = {
    padding:"10px 18px",
    border:"none",
    borderRadius:"4px",
    background:"#f97316",
    color:"white",
    fontWeight:"600",
    cursor:"pointer",
    fontSize:"13px",
    transition:"all 0.2s ease"
}

const clearButton = {
    padding:"10px 16px",
    border:"1px solid #d1d5db",
    borderRadius:"4px",
    background:"white",
    color:"#374151",
    fontWeight:"600",
    cursor:"pointer",
    fontSize:"13px",
    transition:"all 0.2s ease"
}

const createButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    background:"#16a34a",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const filterSelect = {
    padding:"12px",
    borderRadius:"8px",
    border:"none"
}

const logoutButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    background:"#dc2626",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const smallTicketCard = {
    background:"white",
    borderRadius:"12px",
    padding:"16px",
    minHeight:"120px",
    display:"flex",
    flexDirection:"column",
    justifyContent:"space-between",
    boxShadow:"0 2px 8px rgba(0,0,0,0.08)"
}

const ticketText = {
    color:"#4b5563",
    fontSize:"14px",
    margin:"6px 0"
}

const viewButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"10px",
    background:"#2563eb",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const updateButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"10px",
    background:"#f59e0b",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const modalOverlay = {
    position:"fixed",
    top:"0",
    left:"0",
    width:"100%",
    height:"100%",
    background:"rgba(0,0,0,0.45)",
    display:"flex",
    justifyContent:"center",
    alignItems:"center",
    zIndex:"9999"
}

const modalBox = {
    background:"white",
    width:"420px",
    maxWidth:"92%",
    borderRadius:"14px",
    padding:"20px",
    position:"relative"
}

const modalInput = {
    width:"100%",
    padding:"12px",
    marginTop:"15px",
    borderRadius:"8px",
    border:"1px solid #d1d5db",
    boxSizing:"border-box"
}

const submitButton = {
    width:"100%",
    padding:"14px",
    marginTop:"20px",
    border:"none",
    borderRadius:"10px",
    background:"#111827",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const xButton = {
    position:"absolute",
    top:"15px",
    right:"15px",
    width:"40px",
    height:"40px",
    border:"none",
    borderRadius:"50%",
    background:"#dc2626",
    color:"white",
    fontSize:"20px",
    cursor:"pointer"
}

ReactDOM.createRoot(
    document.getElementById("root")
).render(
    e(Home)
)

</script>

</body>
</html>
