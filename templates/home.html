<!DOCTYPE html>
<html>

<head>

    <title>ResolveHub</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</head>

<body style="margin:0;background:#f3f4f6;font-family:Arial;">

<div id="root"></div>

<script>

const e = React.createElement

function Home() {

    const [tickets] = React.useState(
        JSON.parse(`{{ tickets_data | safe }}`)
    )

    const userName = `{{ user_name }}`

    const [showModal, setShowModal] = React.useState(false)

    const [inputText, setInputText] = React.useState("")
    const [searchText, setSearchText] = React.useState("")

    const [statusFilter, setStatusFilter] = React.useState("")
    const [selectedTicket, setSelectedTicket] = React.useState(null)

    const filteredTickets = tickets.filter(ticket => {

        const combinedText = [
            ticket.ticket_id,
            ticket.title,
            ticket.description,
            ticket.priority,
            ticket.status,
            ticket.created_at
        ]
        .join(" ")
        .toLowerCase()

        const matchesSearch =
            combinedText.includes(searchText.toLowerCase())

        const matchesStatus =
            statusFilter === "" ||
            ticket.status === statusFilter

        return matchesSearch && matchesStatus
    })

    return e(
        React.Fragment,
        null,

        // NAVBAR

        e(
            "div",
            {
                style:navbar
            },

            e(
                "h2",
                {
                    style:{
                        margin:"0",
                        fontSize:"32px"
                    }
                },
                "ResolveHub"
            ),

            e(
                "div",
                {
                    style:{
                        display:"flex",
                        flexDirection:"column",
                        alignItems:"center",
                        gap:"15px"
                    }
                },

                e(
                    "span",
                    {
                        style:{
                            color:"white",
                            fontWeight:"bold",
                            fontSize:"18px"
                        }
                    },
                    `Welcome, ${userName}`
                ),

                // SEARCH SECTION

                e(
                    "div",
                    {
                        style:searchContainer
                    },

                    e(
                        "input",
                        {
                            type:"text",

                            placeholder:"Search tickets...",

                            value:inputText,

                            onChange:(event)=>{
                                setInputText(event.target.value)
                            },

                            style:searchInput
                        }
                    ),

                    e(
                        "button",
                        {
                            style:searchButton,

                            onClick:()=>{
                                setSearchText(inputText)
                            }
                        },
                        "Search"
                    ),

                    e(
                        "button",
                        {
                            style:clearButton,

                            onClick:()=>{
                                setInputText("")
                                setSearchText("")
                                setStatusFilter("")
                                setSelectedTicket(null)
                            }
                        },
                        "Clear"
                    )
                ),

                // ACTIONS

                e(
                    "div",
                    {
                        style:{
                            display:"flex",
                            gap:"12px"
                        }
                    },

                    e(
                        "button",
                        {
                            style:createButton,

                            onClick:()=>{
                                setShowModal(true)
                            }
                        },
                        "Create Ticket"
                    ),

                    e(
                        "select",
                        {
                            value:statusFilter,

                            onChange:(event)=>{
                                setStatusFilter(event.target.value)
                            },

                            style:filterSelect
                        },

                        e("option",{value:""},"All Status"),
                        e("option",{value:"Open"},"Open"),
                        e("option",{value:"In Progress"},"In Progress"),
                        e("option",{value:"Closed"},"Closed")
                    ),

                    e(
                        "button",
                        {
                            style:logoutButton,

                            onClick:()=>{
                                window.location.href="/logout"
                            }
                        },
                        "Logout"
                    )
                )
            )
        ),

        // MAIN CONTENT

        e(
            "div",
            {
                style:{
                    padding:"40px"
                }
            },

            e(
                "h1",
                {
                    style:{
                        fontSize:"48px",
                        marginBottom:"10px",
                        color:"#111827"
                    }
                },
                "My Tickets"
            ),

            e(
                "div",
                {
                    style:{
                        display:"grid",
                        gridTemplateColumns:"repeat(auto-fit, minmax(260px, 1fr))",
                        gap:"25px",
                        marginTop:"40px"
                    }
                },

                filteredTickets.map(ticket =>

                    e(
                        "div",
                        {
                            key:ticket.id,
                            style:smallTicketCard
                        },

                        e(
                            "div",
                            null,

                            e(
                                "h2",
                                {
                                    style:{
                                        margin:"0",
                                        fontSize:"22px",
                                        marginBottom:"15px"
                                    }
                                },
                                ticket.title
                            ),

                            e(
                                "p",
                                {
                                    style:ticketText
                                },
                                `Priority: ${ticket.priority}`
                            ),

                            e(
                                "p",
                                {
                                    style:ticketText
                                },
                                `Status: ${ticket.status}`
                            )
                        ),

                        e(
                            "button",
                            {
                                style:viewButton,

                                onClick:()=>{
                                    setSelectedTicket(ticket)
                                }
                            },
                            "View Details"
                        )
                    )
                )
            )
        ),

        // CREATE MODAL

        showModal &&

        e(
            "div",
            {
                style:modalOverlay
            },

            e(
                "div",
                {
                    style:modalBox
                },

                e(
                    "button",
                    {
                        style:xButton,

                        onClick:()=>{
                            setShowModal(false)
                        }
                    },
                    "×"
                ),

                e(
                    "h2",
                    {
                        style:{
                            marginTop:"0",
                            marginBottom:"20px",
                            color:"#111827"
                        }
                    },
                    "Create Support Ticket"
                ),

                e(
                    "form",
                    {
                        method:"POST",
                        action:"/create-ticket"
                    },

                    // CATEGORY

                    e(
                        "select",
                        {
                            name:"title",
                            required:true,
                            style:modalInput
                        },

                        e("option",{value:""},"Select Ticket Category"),

                        e("option",{value:"Payment Issue"},"Payment Issue"),
                        e("option",{value:"Login Problem"},"Login Problem"),
                        e("option",{value:"Account Access Request"},"Account Access Request"),
                        e("option",{value:"Bug Report"},"Bug Report"),
                        e("option",{value:"Feature Request"},"Feature Request"),
                        e("option",{value:"Technical Support"},"Technical Support")
                    ),

                    // DESCRIPTION

                    e(
                        "textarea",
                        {
                            name:"description",

                            placeholder:"Describe your issue in detail...",

                            required:true,

                            style:{
                                ...modalInput,
                                height:"140px",
                                resize:"none"
                            }
                        }
                    ),

                    // PRIORITY

                    e(
                        "select",
                        {
                            name:"priority",
                            required:true,
                            style:modalInput
                        },

                        e("option",{value:""},"Select Priority"),
                        e("option",{value:"Low"},"Low"),
                        e("option",{value:"Medium"},"Medium"),
                        e("option",{value:"High"},"High")
                    ),

                    // SUBMIT BUTTON

                    e(
                        "button",
                        {
                            type:"submit",

                            style:submitButton
                        },
                        "Submit Ticket"
                    )
                )
            )
        ),

        // VIEW MODAL

        selectedTicket &&

        e(
            "div",
            {
                style:modalOverlay
            },

            e(
                "div",
                {
                    style:modalBox
                },

                e(
                    "button",
                    {
                        style:xButton,

                        onClick:()=>{
                            setSelectedTicket(null)
                        }
                    },
                    "×"
                ),

                e("h1",null,selectedTicket.title),

                e("p",null,`Ticket ID: ${selectedTicket.ticket_id}`),
                e("p",null,`Priority: ${selectedTicket.priority}`),
                e("p",null,`Status: ${selectedTicket.status}`),
                e("p",null,`Created At: ${selectedTicket.created_at}`),

                e(
                    "div",
                    {
                        style:{
                            marginTop:"20px"
                        }
                    },

                    e("h3",null,"Description"),

                    e(
                        "p",
                        {
                            style:{
                                lineHeight:"1.8"
                            }
                        },
                        selectedTicket.description
                    )
                )
            )
        )
    )
}

const navbar = {
    background:"#111827",
    color:"white",
    padding:"30px",
    display:"flex",
    flexDirection:"column",
    alignItems:"center",
    gap:"20px"
}

const searchContainer = {
    display:"flex",
    alignItems:"center",
    justifyContent:"center",
    gap:"12px",
    background:"rgba(255,255,255,0.08)",
    padding:"12px 18px",
    borderRadius:"14px"
}

const searchInput = {
    padding:"12px",
    width:"300px",
    borderRadius:"8px",
    border:"none"
}

const searchButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    background:"#2563eb",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const clearButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    background:"#6b7280",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const createButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    background:"#16a34a",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const filterSelect = {
    padding:"12px",
    borderRadius:"8px",
    border:"none"
}

const logoutButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    background:"#dc2626",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const smallTicketCard = {
    background:"white",
    borderRadius:"18px",
    padding:"24px",
    minHeight:"180px",
    display:"flex",
    flexDirection:"column",
    justifyContent:"space-between",
    boxShadow:"0 4px 14px rgba(0,0,0,0.08)"
}

const ticketText = {
    color:"#4b5563",
    fontSize:"16px"
}

const viewButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"10px",
    background:"#2563eb",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const modalOverlay = {
    position:"fixed",
    top:"0",
    left:"0",
    width:"100%",
    height:"100%",
    background:"rgba(0,0,0,0.45)",
    display:"flex",
    justifyContent:"center",
    alignItems:"center",
    zIndex:"9999"
}

const modalBox = {
    background:"white",
    width:"500px",
    borderRadius:"18px",
    padding:"30px",
    position:"relative"
}

const modalInput = {
    width:"100%",
    padding:"12px",
    marginTop:"15px",
    borderRadius:"8px",
    border:"1px solid #d1d5db",
    boxSizing:"border-box"
}

const submitButton = {
    width:"100%",
    padding:"14px",
    marginTop:"20px",
    border:"none",
    borderRadius:"10px",
    background:"#111827",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const xButton = {
    position:"absolute",
    top:"15px",
    right:"15px",
    width:"40px",
    height:"40px",
    border:"none",
    borderRadius:"50%",
    background:"#dc2626",
    color:"white",
    fontSize:"20px",
    cursor:"pointer"
}

ReactDOM.createRoot(
    document.getElementById("root")
).render(
    e(Home)
)

</script>

</body>
</html>
