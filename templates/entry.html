<!DOCTYPE html>
<html>

<head>

    <title>ResolveHub</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</head>

<body style="margin:0;font-family:Arial;background:#f3f4f6;">

<div id="root"></div>

<script>

const e = React.createElement

function EntryPage() {

    return e(
        "div",
        null,

        e(
            "div",
            {
                style:{
                    background:"#111827",
                    color:"white",
                    padding:"20px 40px",
                    display:"flex",
                    justifyContent:"space-between",
                    alignItems:"center"
                }
            },

            e(
                "h2",
                {
                    style:{
                        fontSize:"32px"
                    }
                },
                "ResolveHub"
            ),

            e(
                "button",
                {
                    onClick:()=>{
                        window.location.href="/admin/login"
                    },
                    style:buttonStyle
                },
                "Admin"
            )
        ),

        e(
            "div",
            {
                style:{
                    textAlign:"center",
                    padding:"100px 40px"
                }
            },

            e(
                "h1",
                {
                    style:{
                        fontSize:"64px",
                        color:"#111827"
                    }
                },
                "Welcome to ResolveHub"
            ),

            e(
                "p",
                {
                    style:{
                        width:"75%",
                        margin:"40px auto",
                        fontSize:"22px",
                        lineHeight:"2",
                        color:"#4b5563"
                    }
                },
                "ResolveHub is a modern and intelligent ticket support management platform designed to simplify customer issue tracking and support operations. Users can quickly create support tickets, monitor ticket status, update issue details, and manage their requests efficiently through an easy-to-use interface. The platform ensures transparency and smooth communication between customers and support administrators."
            ),

            e(
                "div",
                {
                    style:{
                        display:"flex",
                        justifyContent:"center",
                        gap:"20px",
                        marginTop:"40px"
                    }
                },

                e(
                    "button",
                    {
                        onClick:()=>{
                            window.location.href="/register"
                        },
                        style:mainButton
                    },
                    "User Registration"
                ),

                e(
                    "button",
                    {
                        onClick:()=>{
                            window.location.href="/login"
                        },
                        style:mainButton
                    },
                    "User Login"
                )
            )
        )
    )
}

const buttonStyle = {
    padding:"12px 20px",
    border:"none",
    borderRadius:"8px",
    cursor:"pointer",
    fontWeight:"bold"
}

const mainButton = {
    padding:"16px 30px",
    border:"none",
    borderRadius:"10px",
    cursor:"pointer",
    fontSize:"18px",
    fontWeight:"bold",
    background:"#111827",
    color:"white"
}

ReactDOM.createRoot(
    document.getElementById("root")
).render(
    e(EntryPage)
)

</script>

</body>
</html>
