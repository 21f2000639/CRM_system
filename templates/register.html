
<!DOCTYPE html>
<html>

<head>

    <title>User Registration</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column !important;
                align-items: flex-start !important;
                padding: 18px !important;
                gap: 16px !important;
            }
            .container {
                flex-direction: column !important;
                justify-content: flex-start !important;
                height: auto !important;
                padding: 20px 16px !important;
            }
            .card {
                width: min(100%, 450px) !important;
                padding: 28px !important;
                margin: 0 auto !important;
            }
            .card input,
            .card button {
                width: 100% !important;
            }
        }
    </style>

</head>

<body style="margin:0;font-family:Arial;background:#eef2ff;">

<div id="root"></div>

<script>

const e = React.createElement

const errorMessage = `{{ error if error else "" }}`

function RegisterPage() {

    return e(
        "div",
        null,

        e(
            "div",
            {
                style:navbar,
                className:"navbar"
            },

            e(
                "h2",
                {
                    style:{
                        margin:"0",
                        fontSize:"28px"
                    }
                },
                "ResolveHub"
            ),

            e(
                "button",
                {
                    onClick:()=>{
                        window.location.href="/"
                    },
                    style:buttonStyle
                },
                "Entry Page"
            )
        ),

        e(
            "div",
            {
                style:container,
                className:"container"
            },

            e(
                "div",
                {
                    style:card,
                    className:"card"
                },

                e(
                    "h1",
                    {
                        style:{
                            textAlign:"center",
                            marginBottom:"10px"
                        }
                    },
                    "User Registration"
                ),

                e(
                    "p",
                    {
                        style:{
                            textAlign:"center",
                            color:"#555",
                            marginBottom:"30px"
                        }
                    },
                    "Create your ResolveHub account to raise support requests, track issue progress, manage tickets efficiently, and communicate with the support administration team through a centralized platform."
                ),

                errorMessage &&
                e(
                    "div",
                    {
                        style:errorBox
                    },
                    errorMessage
                ),

                e(
                    "form",
                    {
                        method:"POST",
                        action:"/register"
                    },

                    e(
                        "input",
                        {
                            type:"text",
                            name:"name",
                            placeholder:"Full Name",
                            required:true,
                            style:inputStyle
                        }
                    ),

                    e(
                        "input",
                        {
                            type:"email",
                            name:"email",
                            placeholder:"Email Address",
                            required:true,
                            style:inputStyle
                        }
                    ),

                    e(
                        "input",
                        {
                            type:"password",
                            name:"password",
                            placeholder:"Password",
                            required:true,
                            style:inputStyle
                        }
                    ),

                    e(
                        "button",
                        {
                            type:"submit",
                            style:submitButton
                        },
                        "Register"
                    )
                ),

                e(
                    "p",
                    {
                        style:{
                            textAlign:"center",
                            marginTop:"20px"
                        }
                    },

                    "Already have an account? ",

                    e(
                        "a",
                        {
                            href:"/login"
                        },
                        "Login"
                    )
                )
            )
        )
    )
}

const navbar = {
    background:"#4338ca",
    color:"white",
    padding:"20px 40px",
    display:"flex",
    justifyContent:"space-between",
    alignItems:"center"
}

const container = {
    display:"flex",
    justifyContent:"center",
    alignItems:"center",
    height:"85vh"
}

const card = {
    background:"white",
    padding:"40px",
    borderRadius:"14px",
    width:"450px",
    boxShadow:"0 3px 12px rgba(0,0,0,0.1)"
}

const inputStyle = {
    width:"100%",
    padding:"14px",
    marginTop:"15px",
    borderRadius:"8px",
    border:"1px solid #ccc",
    boxSizing:"border-box",
    fontSize:"15px"
}

const buttonStyle = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    cursor:"pointer",
    fontWeight:"bold"
}

const submitButton = {
    width:"100%",
    padding:"14px",
    marginTop:"25px",
    border:"none",
    borderRadius:"8px",
    background:"#111827",
    color:"white",
    fontSize:"16px",
    cursor:"pointer",
    fontWeight:"bold"
}

const errorBox = {
    background:"#fee2e2",
    color:"#991b1b",
    padding:"12px",
    borderRadius:"8px",
    marginBottom:"20px",
    textAlign:"center",
    fontWeight:"bold"
}

ReactDOM.createRoot(
    document.getElementById("root")
).render(
    e(RegisterPage)
)

</script>

</body>
</html>
