<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</head>

<body style="margin:0;background:#f3f4f6;font-family:Arial;">

<div id="root"></div>

<script>

const e = React.createElement

function AdminDashboard() {

    const [tickets] = React.useState(
        JSON.parse(`{{ tickets_data | safe }}`)
    )

    const [inputText, setInputText] = React.useState("")
    const [searchText, setSearchText] = React.useState("")

    const [statusFilter, setStatusFilter] = React.useState("")
    const [selectedTicket, setSelectedTicket] = React.useState(null)

    const filteredTickets = tickets.filter(ticket => {

        const combinedText = [
            ticket.ticket_id,
            ticket.user_name,
            ticket.user_email,
            ticket.priority,
            ticket.description,
            ticket.created_at,
            ticket.status,
            ticket.title
        ]
        .join(" ")
        .toLowerCase()

        const matchesSearch =
            combinedText.includes(searchText.toLowerCase())

        const matchesStatus =
            statusFilter === "" ||
            ticket.status === statusFilter

        return matchesSearch && matchesStatus
    })

    return e(

        React.Fragment,
        null,

        // ======================================
        // NAVBAR
        // ======================================

        e(
            "div",
            {
                style:navbar
            },

            e(
                "h2",
                {
                    style:{
                        margin:"0",
                        fontSize:"30px"
                    }
                },
                "ResolveHub Admin"
            ),

            e(
                "div",
                {
                    style:{
                        display:"flex",
                        gap:"10px",
                        alignItems:"center"
                    }
                },

                e(
                    "input",
                    {
                        type:"text",

                        placeholder:"Search tickets...",

                        value:inputText,

                        onChange:(event)=>{
                            setInputText(event.target.value)
                        },

                        style:searchInput
                    }
                ),

                e(
                    "button",
                    {
                        style:searchButton,

                        onClick:()=>{
                            setSearchText(inputText)
                        }
                    },
                    "Search"
                ),

                e(
                    "button",
                    {
                        style:clearButton,

                        onClick:()=>{
                            setInputText("")
                            setSearchText("")
                            setStatusFilter("")
                            setSelectedTicket(null)
                        }
                    },
                    "Clear"
                ),

                e(
                    "select",
                    {
                        value:statusFilter,

                        onChange:(event)=>{
                            setStatusFilter(event.target.value)
                        },

                        style:filterSelect
                    },

                    e("option",{value:""},"All Status"),
                    e("option",{value:"Open"},"Open"),
                    e("option",{value:"In Progress"},"In Progress"),
                    e("option",{value:"Closed"},"Closed")
                ),

                e(
                    "button",
                    {
                        style:logoutButton,

                        onClick:()=>{
                            window.location.href="/admin/logout"
                        }
                    },
                    "Logout"
                )
            )
        ),

        // ======================================
        // MAIN CONTENT
        // ======================================

        e(
            "div",
            {
                style:{
                    padding:"40px"
                }
            },

            e(
                "h1",
                {
                    style:{
                        fontSize:"48px",
                        marginBottom:"10px",
                        color:"#111827"
                    }
                },
                "Admin Dashboard"
            ),

            e(
                "p",
                {
                    style:{
                        fontSize:"20px",
                        lineHeight:"1.8",
                        color:"#4b5563",
                        marginBottom:"40px"
                    }
                },
                "Monitor and manage all customer support tickets."
            ),

            filteredTickets.length === 0 ?

            e(
                "h2",
                {
                    style:{
                        color:"#6b7280"
                    }
                },
                "No tickets found"
            )

            :

            e(
                "div",
                {
                    style:{
                        display:"grid",
                        gridTemplateColumns:"repeat(auto-fit, minmax(260px, 1fr))",
                        gap:"25px"
                    }
                },

                filteredTickets.map(ticket =>

                    e(
                        "div",
                        {
                            key:ticket.id,
                            style:smallTicketCard
                        },

                        e(
                            "div",
                            null,

                            e(
                                "h2",
                                {
                                    style:{
                                        margin:"0",
                                        color:"#111827",
                                        fontSize:"22px",
                                        marginBottom:"18px"
                                    }
                                },
                                ticket.title
                            ),

                            e(
                                "p",
                                {
                                    style:ticketText
                                },
                                `Priority: ${ticket.priority}`
                            ),

                            e(
                                "p",
                                {
                                    style:ticketText
                                },
                                `Status: ${ticket.status}`
                            )
                        ),

                        e(
                            "button",
                            {
                                style:viewButton,

                                onClick:()=>{
                                    setSelectedTicket(ticket)
                                }
                            },
                            "View Details"
                        )
                    )
                )
            )
        ),

        // ======================================
        // VIEW MODAL
        // ======================================

        selectedTicket &&

        e(
            "div",
            {
                style:modalOverlay
            },

            e(
                "div",
                {
                    style:modalBox
                },

                e(
                    "button",
                    {
                        style:xButton,

                        onClick:()=>{
                            setSelectedTicket(null)
                        }
                    },
                    "×"
                ),

                e(
                    "h1",
                    {
                        style:{
                            marginTop:"0",
                            color:"#111827"
                        }
                    },
                    selectedTicket.title
                ),

                e(
                    "div",
                    {
                        style:{
                            marginTop:"20px",
                            lineHeight:"2",
                            color:"#374151",
                            fontSize:"17px"
                        }
                    },

                    e("p",null,`Ticket ID: ${selectedTicket.ticket_id}`),
                    e("p",null,`Customer Name: ${selectedTicket.user_name}`),
                    e("p",null,`Customer Email: ${selectedTicket.user_email}`),
                    e("p",null,`Priority: ${selectedTicket.priority}`),
                    e("p",null,`Status: ${selectedTicket.status}`),
                    e("p",null,`Created At: ${selectedTicket.created_at}`)
                ),

                e(
                    "div",
                    {
                        style:{
                            marginTop:"30px",
                            background:"#f9fafb",
                            padding:"22px",
                            borderRadius:"14px"
                        }
                    },

                    e(
                        "h3",
                        {
                            style:{
                                marginTop:"0",
                                color:"#111827"
                            }
                        },
                        "Description"
                    ),

                    e(
                        "p",
                        {
                            style:{
                                lineHeight:"1.9",
                                color:"#4b5563"
                            }
                        },
                        selectedTicket.description
                    )
                ),

                // ======================================
                // ADMIN STATUS UPDATE
                // ======================================

                e(
                    "form",
                    {
                        method:"POST",

                        action:`/admin/update-status/${selectedTicket.id}`,

                        style:{
                            marginTop:"30px",
                            display:"flex",
                            gap:"15px",
                            alignItems:"center"
                        }
                    },

                    e(
                        "select",
                        {
                            name:"status",

                            defaultValue:selectedTicket.status,

                            style:updateSelect
                        },

                        e("option",{value:"Open"},"Open"),
                        e("option",{value:"In Progress"},"In Progress"),
                        e("option",{value:"Closed"},"Closed")
                    ),

                    e(
                        "button",
                        {
                            type:"submit",

                            style:updateButton
                        },
                        "Update Status"
                    )
                )
            )
        )
    )
}

// ======================================
// STYLES
// ======================================

const navbar = {
    background:"#111827",
    color:"white",
    padding:"20px 40px",
    display:"flex",
    justifyContent:"space-between",
    alignItems:"center"
}

const searchInput = {
    padding:"12px",
    width:"260px",
    borderRadius:"8px",
    border:"none"
}

const searchButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    background:"#2563eb",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const clearButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    background:"#6b7280",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const filterSelect = {
    padding:"12px",
    borderRadius:"8px",
    border:"none"
}

const logoutButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    background:"#dc2626",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const smallTicketCard = {
    background:"white",
    borderRadius:"18px",
    padding:"24px",
    minHeight:"180px",
    display:"flex",
    flexDirection:"column",
    justifyContent:"space-between",
    boxShadow:"0 4px 14px rgba(0,0,0,0.08)"
}

const ticketText = {
    color:"#4b5563",
    fontSize:"16px",
    lineHeight:"1.8"
}

const viewButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"10px",
    background:"#2563eb",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const modalOverlay = {
    position:"fixed",
    top:"0",
    left:"0",
    width:"100%",
    height:"100%",
    background:"rgba(0,0,0,0.45)",
    backdropFilter:"blur(6px)",
    display:"flex",
    justifyContent:"center",
    alignItems:"center",
    zIndex:"9999"
}

const modalBox = {
    background:"white",
    width:"500px",
    maxWidth:"92%",
    borderRadius:"18px",
    padding:"30px",
    position:"relative"
}

const xButton = {
    position:"absolute",
    top:"15px",
    right:"15px",
    width:"40px",
    height:"40px",
    border:"none",
    borderRadius:"50%",
    background:"#dc2626",
    color:"white",
    fontSize:"20px",
    cursor:"pointer"
}

const updateSelect = {
    padding:"12px",
    borderRadius:"10px",
    width:"220px"
}

const updateButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"10px",
    background:"#111827",
    color:"white",
    cursor:"pointer",
    fontWeight:"bold"
}

ReactDOM.createRoot(
    document.getElementById("root")
).render(
    e(AdminDashboard)
)

</script>

</body>
</html>
