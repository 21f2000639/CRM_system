<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</head>

<body style="margin:0;background:#eef2ff;font-family:Arial;">

<div id="root"></div>

<script>

const e = React.createElement

function AdminDashboard() {

    const [tickets] = React.useState(
        JSON.parse(`{{ tickets_data | safe }}`)
    )

    const [inputText, setInputText] = React.useState("")
    const [searchText, setSearchText] = React.useState("")

    const [statusFilter, setStatusFilter] = React.useState("")
    const [selectedTicket, setSelectedTicket] = React.useState(null)
    const [isMobile, setIsMobile] = React.useState(window.innerWidth <= 768)

    React.useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth <= 768)
        window.addEventListener("resize", handleResize)
        return () => window.removeEventListener("resize", handleResize)
    }, [])

    const navbarStyle = {
        ...navbar,
        flexDirection: "column",
        alignItems: "stretch",
        gap: isMobile ? "18px" : "20px",
        padding: isMobile ? "20px" : "30px 40px"
    }

    const topRowStyle = {
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        width: "100%",
        gap: "16px",
        flexWrap: "wrap"
    }

    const searchBoxStyle = {
        ...searchBox,
        width: "auto",
        justifyContent: "center",
        flexDirection: isMobile ? "column" : "row",
        alignItems: "center",
        flexWrap: "nowrap"
    }

    const searchInputStyle = {
        ...searchInput,
        width: isMobile ? "100%" : "260px"
    }

    const filterRowStyle = {
        display: "flex",
        gap: "16px",
        alignItems: "center",
        flexWrap: isMobile ? "wrap" : "nowrap",
        width: isMobile ? "100%" : "auto"
    }

    const statusSelectStyle = {
        ...filterSelect,
        width: isMobile ? "100%" : "auto"
    }

    const contentPadding = isMobile ? "20px" : "40px"

    const filteredTickets = tickets.filter(ticket => {

        const combinedText = [
            ticket.ticket_id,
            ticket.user_name,
            ticket.user_email,
            ticket.priority,
            ticket.description,
            ticket.created_at,
            ticket.status,
            ticket.title
        ]
        .join(" ")
        .toLowerCase()

        const matchesSearch =
            combinedText.includes(searchText.toLowerCase())

        const matchesStatus =
            statusFilter === "" ||
            ticket.status === statusFilter

        return matchesSearch && matchesStatus
    })

    return e(

        React.Fragment,
        null,

        // ======================================
        // NAVBAR
        // ======================================

        e(
            "div",
            {
                style:navbarStyle
            },

            e(
                "div",
                {
                    style:topRowStyle
                },

                e(
                    "h2",
                    {
                        style:{
                            margin:0,
                            fontSize:"28px"
                        }
                    },
                    "ResolveHub Admin"
                )
            ),

            e(
                "div",
                {
                    style:searchBoxStyle
                },
                e(
                    "input",
                    {
                        type:"text",
                        placeholder:"Search tickets...",
                        value:inputText,
                        onChange:(event)=>{
                            setInputText(event.target.value)
                        },
                        style:searchInputStyle
                    }
                ),
                e(
                    "button",
                    {
                        style:searchButton,
                        onClick:()=>{
                            setSearchText(inputText)
                        }
                    },
                    "Search"
                ),
                e(
                    "button",
                    {
                        style:clearButton,
                        onClick:()=>{
                            setInputText("")
                            setSearchText("")
                            setStatusFilter("")
                            setSelectedTicket(null)
                        }
                    },
                    "Clear"
                )
            ),

            e(
                "div",
                {
                    style:filterRowStyle
                },
                e(
                    "select",
                    {
                        value:statusFilter,
                        onChange:(event)=>{
                            setStatusFilter(event.target.value)
                        },
                        style:statusSelectStyle
                    },
                    e("option",{value:""},"All Status"),
                    e("option",{value:"Open"},"Open"),
                    e("option",{value:"In Progress"},"In Progress"),
                    e("option",{value:"Closed"},"Closed")
                ),
                e(
                    "button",
                    {
                        style:logoutButton,
                        onClick:()=>{
                            window.location.href="/admin/logout"
                        }
                    },
                    "Logout"
                )
            )
        ),

        // ======================================
        // MAIN CONTENT
        // ======================================

        e(
            "div",
            {
                style:{
                    padding:contentPadding
                }
            },

            e(
                "h1",
                {
                    style:{
                        fontSize:"48px",
                        marginBottom:"10px",
                        color:"#111827"
                    }
                },
                "Admin Dashboard"
            ),

            e(
                "p",
                {
                    style:{
                        fontSize:"20px",
                        lineHeight:"1.8",
                        color:"#4b5563",
                        marginBottom:"40px"
                    }
                },
                "Monitor and manage all customer support tickets."
            ),

            filteredTickets.length === 0 ?

            e(
                "h2",
                {
                    style:{
                        color:"#6b7280"
                    }
                },
                "No tickets found"
            )

            :

            e(
                "div",
                {
                    style:{
                        display:"grid",
                        gridTemplateColumns:"repeat(auto-fit, minmax(220px, 1fr))",
                        justifyContent:"center",
                        gap:"20px"
                    }
                },

                filteredTickets.map(ticket =>

                    e(
                        "div",
                        {
                            key:ticket.id,
                            style:smallTicketCard
                        },

                        e(
                            "div",
                            null,

                            e(
                                "h2",
                                {
                                    style:{
                                        margin:"0",
                                        color:"#111827",
                                        fontSize:"22px",
                                        marginBottom:"18px"
                                    }
                                },
                                ticket.title
                            ),

                            e(
                                "p",
                                {
                                    style:ticketText
                                },
                                `Priority: ${ticket.priority}`
                            ),

                            e(
                                "p",
                                {
                                    style:ticketText
                                },
                                `Status: ${ticket.status}`
                            )
                        ),

                        e(
                            "button",
                            {
                                style:viewButton,

                                onClick:()=>{
                                    setSelectedTicket(ticket)
                                }
                            },
                            "View Details"
                        )
                    )
                )
            )
        ),

        // ======================================
        // VIEW MODAL
        // ======================================

        selectedTicket &&

        e(
            "div",
            {
                style:modalOverlay
            },

            e(
                "div",
                {
                    style:modalBox
                },

                e(
                    "button",
                    {
                        style:xButton,

                        onClick:()=>{
                            setSelectedTicket(null)
                        }
                    },
                    "×"
                ),

                e(
                    "h1",
                    {
                        style:{
                            marginTop:"0",
                            color:"#111827"
                        }
                    },
                    selectedTicket.title
                ),

                e(
                    "div",
                    {
                        style:{
                            marginTop:"0",
                            lineHeight:"1.6",
                            color:"#374151",
                            fontSize:"14px"
                        }
                    },

                    e(
                        "p",
                        {
                            style:{
                                fontSize:"12px",
                                color:"#6b7280",
                                margin:"4px 0"
                            }
                        },
                        `ID: ${selectedTicket.ticket_id}`
                    ),

                    e(
                        "p",
                        {
                            style:{
                                fontSize:"13px",
                                color:"#4b5563",
                                margin:"4px 0"
                            }
                        },
                        `Customer: ${selectedTicket.user_name}`
                    ),

                    e(
                        "p",
                        {
                            style:{
                                fontSize:"13px",
                                color:"#4b5563",
                                margin:"4px 0"
                            }
                        },
                        `Email: ${selectedTicket.user_email}`
                    ),

                    e(
                        "p",
                        {
                            style:{
                                fontSize:"13px",
                                color:"#4b5563",
                                margin:"4px 0"
                            }
                        },
                        `Priority: ${selectedTicket.priority}`
                    ),

                    e(
                        "p",
                        {
                            style:{
                                fontSize:"13px",
                                color:"#4b5563",
                                margin:"4px 0"
                            }
                        },
                        `Status: ${selectedTicket.status}`
                    ),

                    e(
                        "p",
                        {
                            style:{
                                fontSize:"12px",
                                color:"#6b7280",
                                margin:"4px 0"
                            }
                        },
                        `Created: ${selectedTicket.created_at}`
                    )
                ),

                e(
                    "hr",
                    {
                        style:{
                            border:"none",
                            borderTop:"1px solid #e5e7eb",
                            margin:"12px 0"
                        }
                    }
                ),

                e(
                    "p",
                    {
                        style:{
                            fontSize:"13px",
                            lineHeight:"1.6",
                            color:"#4b5563",
                            margin:"0 0 12px 0"
                        }
                    },
                    selectedTicket.description
                ),

                // ======================================
                // ADMIN STATUS UPDATE
                // ======================================

                e(
                    "form",
                    {
                        method:"POST",

                        action:`/admin/update-status/${selectedTicket.id}`,

                        style:{
                            marginTop:"30px",
                            display:"flex",
                            gap:"15px",
                            alignItems:"center"
                        }
                    },

                    e(
                        "select",
                        {
                            name:"status",

                            defaultValue:selectedTicket.status,

                            style:updateSelect
                        },

                        e("option",{value:"Open"},"Open"),
                        e("option",{value:"In Progress"},"In Progress"),
                        e("option",{value:"Closed"},"Closed")
                    ),

                    e(
                        "button",
                        {
                            type:"submit",

                            style:updateButton
                        },
                        "Update Status"
                    )
                )
            )
        )
    )
}

// ======================================
// STYLES
// ======================================

const navbar = {
    background:"#4338ca",
    color:"white",
    padding:"30px 40px",
    minHeight:"120px",
    display:"flex",
    justifyContent:"space-between",
    alignItems:"center",
    position:"relative"
}

const searchInput = {
    padding:"10px 14px",
    width:"300px",
    borderRadius:"20px",
    border:"none",
    fontSize:"14px",
    background:"white",
    outline:"none"
}

const searchButton = {
    padding:"10px 18px",
    border:"none",
    borderRadius:"20px",
    background:"#4338ca",
    color:"white",
    fontWeight:"600",
    cursor:"pointer",
    fontSize:"13px",
    transition:"all 0.2s ease"
}

const clearButton = {
    padding:"10px 16px",
    border:"1px solid #d1d5db",
    borderRadius:"20px",
    background:"white",
    color:"#374151",
    fontWeight:"600",
    cursor:"pointer",
    fontSize:"13px",
    transition:"all 0.2s ease"
}

const searchBox = {
    display:"flex",
    alignItems:"center",
    gap:"6px",
    padding:"6px 8px",
    background:"rgba(255,255,255,0.95)",
    borderRadius:"28px",
    border:"1px solid #d1d5db",
    width:"auto",
    flexWrap:"nowrap",
    boxShadow:"0 2px 8px rgba(0,0,0,0.06)"
}

const filterSelect = {
    padding:"12px",
    borderRadius:"8px",
    border:"none"
}

const logoutButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"8px",
    background:"#dc2626",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const smallTicketCard = {
    background:"white",
    borderRadius:"12px",
    padding:"16px",
    minHeight:"120px",
    display:"flex",
    flexDirection:"column",
    justifyContent:"space-between",
    boxShadow:"0 2px 8px rgba(0,0,0,0.08)"
}

const ticketText = {
    color:"#4b5563",
    fontSize:"14px",
    margin:"6px 0"
}

const viewButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"10px",
    background:"#2563eb",
    color:"white",
    fontWeight:"bold",
    cursor:"pointer"
}

const modalOverlay = {
    position:"fixed",
    top:"0",
    left:"0",
    width:"100%",
    height:"100%",
    background:"rgba(0,0,0,0.45)",
    backdropFilter:"blur(6px)",
    display:"flex",
    justifyContent:"center",
    alignItems:"center",
    zIndex:"9999"
}

const modalBox = {
    background:"white",
    width:"420px",
    maxWidth:"92%",
    borderRadius:"14px",
    padding:"20px",
    position:"relative"
}

const xButton = {
    position:"absolute",
    top:"15px",
    right:"15px",
    width:"40px",
    height:"40px",
    border:"none",
    borderRadius:"50%",
    background:"#dc2626",
    color:"white",
    fontSize:"20px",
    cursor:"pointer"
}

const updateSelect = {
    padding:"12px",
    borderRadius:"10px",
    width:"220px"
}

const updateButton = {
    padding:"12px 18px",
    border:"none",
    borderRadius:"10px",
    background:"#111827",
    color:"white",
    cursor:"pointer",
    fontWeight:"bold"
}

ReactDOM.createRoot(
    document.getElementById("root")
).render(
    e(AdminDashboard)
)

</script>

</body>
</html>
